<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Pipe Menu UI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:'Orbitron',sans-serif;

background:
radial-gradient(circle at top,#111,#020202 70%);
}

/* ================= MAIN PIPELINE ================= */

.pipeline{
position:relative;
display:flex;
align-items:center;
width:1650px;
height:220px;
}

/* ================= MAIN PIPE ================= */

.main-pipe{
position:absolute;
left:0;
top:50%;
transform:translateY(-50%);
width:100%;
height:70px;
border-radius:50px;

background:
linear-gradient(
180deg,
#f7f7f7 0%,
#b8b8b8 15%,
#5f5f5f 30%,
#ffffff 50%,
#666 72%,
#dcdcdc 100%
);

box-shadow:
0 0 0 5px #333,
0 25px 40px rgba(0,0,0,.8),
inset 0 6px 10px rgba(255,255,255,.8),
inset 0 -8px 12px rgba(0,0,0,.9);

overflow:hidden;
}

/* ================= FLOWING WATER ================= */

.main-pipe::before{
content:"";
position:absolute;
left:-50%;
top:12px;
width:200%;
height:45px;

background:
linear-gradient(
90deg,
transparent,
rgba(0,255,255,.2),
rgba(0,170,255,.8),
rgba(0,255,255,.2),
transparent
);

filter:blur(10px);

animation:flow 4s linear infinite;
}

/* ================= MENU WRAP ================= */

.menu{
position:relative;
display:flex;
gap:65px;
width:100%;
justify-content:center;
z-index:5;
}

/* ================= PIPE MENU ITEM ================= */

.pipe-item{
position:relative;
width:240px;
height:140px;

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;
transition:.45s;
}

/* ================= GLASS PIPE ================= */

.glass{
position:absolute;
width:100%;
height:100%;
border-radius:30px;

background:
linear-gradient(
180deg,
rgba(255,255,255,.22),
rgba(255,255,255,.04)
);

border-top:3px solid rgba(255,255,255,.35);
border-bottom:3px solid rgba(255,255,255,.12);

backdrop-filter:blur(6px);

overflow:hidden;

box-shadow:
0 0 0 5px rgba(255,255,255,.06),
0 15px 35px rgba(0,0,0,.65),
inset 0 5px 12px rgba(255,255,255,.2),
inset 0 -5px 12px rgba(0,0,0,.7);
}

/* shine */

.glass::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:45%;

background:
linear-gradient(
180deg,
rgba(255,255,255,.35),
transparent
);
}

/* ================= WATER ================= */

.water{
position:absolute;
bottom:0;
left:0;
width:220%;
height:52px;

background:
linear-gradient(
180deg,
#4fe3ff,
#006eff
);

animation:waterMove 3s linear infinite;
}

/* waves */

.water::before{
content:"";
position:absolute;
top:-12px;
left:0;
width:220%;
height:40px;

background:
radial-gradient(circle at 20px 20px,
rgba(255,255,255,.95) 0 12px,
transparent 13px);

background-size:80px 40px;
opacity:.7;

animation:wave 2s linear infinite;
}

/* bubbles */

.water::after{
content:"";
position:absolute;
inset:0;

background:
radial-gradient(circle,
rgba(255,255,255,.9) 2px,
transparent 3px);

background-size:60px 60px;
opacity:.35;
}

/* ================= TEXT ================= */

.pipe-item span{
position:relative;
z-index:5;

font-size:28px;
font-weight:700;
letter-spacing:2px;
color:white;

text-shadow:
0 0 12px rgba(255,255,255,.5),
0 0 25px rgba(0,217,255,.6);
}

/* ================= PIPE JOINTS ================= */

.joint-left,
.joint-right{
position:absolute;
top:50%;
transform:translateY(-50%);
width:42px;
height:160px;
border-radius:20px;

background:
linear-gradient(
90deg,
#2b2b2b 0%,
#b0b0b0 20%,
#ffffff 50%,
#666 75%,
#1f1f1f 100%
);

box-shadow:
inset 0 4px 8px rgba(255,255,255,.7),
inset 0 -5px 8px rgba(0,0,0,.9),
0 0 12px rgba(0,0,0,.6);
}

.joint-left{
left:-18px;
}

.joint-right{
right:-18px;
}

/* bolts */

.joint-left::before,
.joint-left::after,
.joint-right::before,
.joint-right::after{
content:"";
position:absolute;
left:7px;
width:28px;
height:6px;
border-radius:10px;
background:#2d2d2d;
}

.joint-left::before,
.joint-right::before{
top:16px;
}

.joint-left::after,
.joint-right::after{
bottom:16px;
}

/* ================= HOVER ================= */

.pipe-item:hover{
transform:translateY(-18px) scale(1.05);
}

.pipe-item:hover .glass{
box-shadow:
0 0 35px rgba(0,217,255,.25),
0 20px 45px rgba(0,0,0,.8),
inset 0 5px 12px rgba(255,255,255,.2),
inset 0 -5px 12px rgba(0,0,0,.8);
}

.pipe-item:hover .water{
filter:brightness(1.3);
}

.pipe-item:hover span{
letter-spacing:4px;
}

/* ================= SIDE WATER FALL ================= */

.left-flow,
.right-flow{
position:absolute;
width:50px;
height:190px;
overflow:hidden;
border-radius:30px;
z-index:1;
}

.left-flow{
left:-5px;
top:130px;
}

.right-flow{
right:-5px;
top:130px;
}

.left-flow::before,
.right-flow::before{
content:"";
position:absolute;
width:100%;
height:200%;

background:
linear-gradient(
180deg,
rgba(180,240,255,.95),
rgba(0,153,255,.95),
rgba(180,240,255,.95)
);

animation:fall 1s linear infinite;
}

/* ================= ANIMATIONS ================= */

@keyframes flow{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-30%);
}

}

@keyframes waterMove{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-50%);
}

}

@keyframes wave{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-80px);
}

}

@keyframes fall{

0%{
transform:translateY(-50%);
}

100%{
transform:translateY(0%);
}

}

/* ================= RESPONSIVE ================= */

@media(max-width:1700px){

.pipeline{
transform:scale(.8);
}

}

@media(max-width:1300px){

.pipeline{
transform:scale(.58);
}

}

@media(max-width:900px){

.pipeline{
transform:scale(.38);
}

}

</style>
</head>

<body>

<div class="pipeline">

<div class="main-pipe"></div>

<div class="left-flow"></div>
<div class="right-flow"></div>

<div class="menu">

<!-- HOME -->

<div class="pipe-item">

<div class="joint-left"></div>

<div class="glass">
<div class="water"></div>
</div>

<span>HOME</span>

<div class="joint-right"></div>

</div>

<!-- MOVIES -->

<div class="pipe-item">

<div class="joint-left"></div>

<div class="glass">
<div class="water"></div>
</div>

<span>MOVIES</span>

<div class="joint-right"></div>

</div>

<!-- SERIES -->

<div class="pipe-item">

<div class="joint-left"></div>

<div class="glass">
<div class="water"></div>
</div>

<span>SERIES</span>

<div class="joint-right"></div>

</div>

<!-- TRENDING -->

<div class="pipe-item">

<div class="joint-left"></div>

<div class="glass">
<div class="water"></div>
</div>

<span>TRENDING</span>

<div class="joint-right"></div>

</div>

<!-- CONTACT -->

<div class="pipe-item">

<div class="joint-left"></div>

<div class="glass">
<div class="water"></div>
</div>

<span>CONTACT</span>

<div class="joint-right"></div>

</div>

</div>

</div>

</body>
</html>
