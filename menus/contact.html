<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Jaideep Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL THEME
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#070716;
--card:#0d0d22;
--text:#fff;
--gray:#b9b9c9;
--pink:#ff4ecd;
--blue:#5b9cff;
--cyan:#00f0ff;
}

body{
font-family:'Poppins',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* glow */
body::before{
content:'';
position:fixed;
top:-200px;
left:-200px;
width:500px;
height:500px;
background:#5b9cff22;
filter:blur(120px);
z-index:-1;
}

body::after{
content:'';
position:fixed;
bottom:-200px;
right:-200px;
width:500px;
height:500px;
background:#ff4ecd22;
filter:blur(120px);
z-index:-1;
}

/* =========================
   PAGE
========================= */

.contact-page{
padding:120px 80px;
max-width:1200px;
margin:auto;
}

/* TITLE */

.title{
text-align:center;
font-size:55px;
margin-bottom:10px;
}

.title span{
background:linear-gradient(45deg,var(--pink),var(--blue));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:60px;
}

/* =========================
   GRID
========================= */

.contact-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

/* CARD */
.card{
background:#0d0d22;
padding:30px;
border-radius:25px;
position:relative;
overflow:hidden;
transition:0.3s;
text-align:center;
}

.card::before{
content:'';
position:absolute;
inset:0;
padding:2px;
border-radius:25px;
background:linear-gradient(45deg,var(--pink),var(--blue),var(--cyan));
-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px #5b9cff33;
}

/* ICON */
.icon{
font-size:40px;
margin-bottom:15px;
}

/* TEXT */
.card h3{
margin-bottom:10px;
font-size:22px;
}

.card p{
color:#aaa;
font-size:14px;
line-height:1.6;
word-break:break-word;
}

/* =========================
   CONTACT FORM
========================= */

.form-box{
margin-top:70px;
background:#0d0d22;
padding:40px;
border-radius:30px;
position:relative;
overflow:hidden;
}

.form-box::before{
content:'';
position:absolute;
inset:0;
padding:2px;
border-radius:30px;
background:linear-gradient(45deg,var(--pink),var(--blue),var(--cyan));
-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
}

.form-box h2{
text-align:center;
margin-bottom:25px;
}

form{
display:grid;
gap:15px;
max-width:700px;
margin:auto;
}

input,textarea{
padding:15px;
border-radius:12px;
border:none;
outline:none;
background:#111;
color:#fff;
font-size:14px;
}

textarea{
min-height:120px;
resize:none;
}

/* BUTTON */

button{
padding:14px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,var(--pink),var(--blue));
color:#fff;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 0 20px #5b9cff55;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:992px){
.contact-grid{
grid-template-columns:1fr;
}
.contact-page{
padding:110px 30px;
}
.title{
font-size:40px;
}
}

@media(max-width:600px){
.title{
font-size:30px;
}
.form-box{
padding:25px;
}
}

</style>
</head>

<body>

<div class="contact-page">

<h1 class="title">Contact <span>Me</span></h1>
<p class="subtitle">Let’s build something amazing together 🚀</p>

<!-- ================= CONTACT INFO ================= -->

<div class="contact-grid">

<div class="card">
<div class="icon">📞</div>
<h3>Phone</h3>
<p>+91 9226720616</p>
</div>

<div class="card">
<div class="icon">📧</div>
<h3>Email</h3>
<p>jaidipmeshram0@gmail.com</p>
</div>

<div class="card">
<div class="icon">🌐</div>
<h3>Project</h3>
<p>DesiChatRoom.com<br>Real-time Chat Platform</p>
</div>

</div>

<!-- ================= CONTACT FORM ================= -->

<div class="form-box">

<h2>Send Message</h2>

<form>

<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>

</body>
</html>
